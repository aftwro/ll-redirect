<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote — Lunarlabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #242424;
    --border-hover: #3a3a3a;
    --text: #e8e8e8;
    --muted: #666;
    --dim: #444;
    --ready: #4ade80;
    --ready-dim: #166534;
    --mc: 'Press Start 2P', monospace;
    --ui: 'Inter', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--ui);
    font-size: 15px;
    min-height: 100vh;
  }

  .page {
    max-width: 580px;
    margin: 0 auto;
    padding: 3.5rem 1.25rem 4rem;
  }

  /* Header */
  .header {
    margin-bottom: 3rem;
  }

  .header-eyebrow {
    font-family: var(--mc);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-bottom: 14px;
  }

  .header h1 {
    font-family: var(--mc);
    font-size: 21px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .header p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* Vote list */
  .vote-list {
    display: flex;
    flex-direction: column;
  }

  .vote-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 15px 0;
    border-bottom: 1px solid var(--border);
  }

  .vote-item:first-child {
    border-top: 1px solid var(--border);
  }

  .vote-left {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
    flex: 1;
  }

  .vote-index {
    font-size: 12px;
    color: var(--dim);
    width: 16px;
    flex-shrink: 0;
    text-align: right;
  }

  .vote-info { min-width: 0; }

  .vote-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .vote-host {
    font-size: 12px;
    color: var(--muted);
  }

  /* Right side */
  .vote-right {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .countdown {
    font-size: 13px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    white-space: nowrap;
    min-width: 72px;
    text-align: right;
  }

  .countdown.ready {
    color: var(--ready);
  }

  .vote-btn {
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border: 1px solid var(--border-hover);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.12s, border-color 0.12s;
    white-space: nowrap;
    border-radius: 0;
    line-height: 1;
  }

  .vote-btn:hover {
    background: #1a1a1a;
    border-color: #555;
  }

  .vote-btn.voted {
    color: var(--dim);
    border-color: var(--border);
    pointer-events: none;
    cursor: default;
  }

  .vote-btn svg {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
  }

  /* Footer */
  .footer {
    margin-top: 2.5rem;
    font-size: 12px;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .footer svg {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
    opacity: 0.5;
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 15px; }
    .vote-btn { padding: 8px 12px; font-size: 12px; }
    .countdown { min-width: 60px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <p class="header-eyebrow">play.lunarlabs.fun</p>
    <h1>Vote for<br>LunarLabs</h1>
    <p>Cast your vote on each site once every 24 hours.<br>It takes less than a minute and helps us grow.</p>
  </header>

  <div class="vote-list" id="voteList"></div>

  <p class="footer">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="13" r="4"/><path d="M12 9V7m0 0a5 5 0 0 0-5 5H5m7-5a5 5 0 0 1 5 5h2"/><path d="M12 17v1a3 3 0 0 0 3 3h1"/></svg>
    This page stores cookies to track your vote cooldowns.
  </p>

</div>

<script>
const SITES = [
  { id: 'v1', name: 'Top Minecraft Servers', host: 'topminecraftservers.org',   url: 'https://topminecraftservers.org/vote/43186',                               offset: 0  },
  { id: 'v2', name: 'Minecraft Servers',      host: 'minecraftservers.org',      url: 'https://minecraftservers.org/vote/685936',                                  offset: 7  },
  { id: 'v3', name: 'CurseForge',             host: 'curseforge.com',            url: 'https://www.curseforge.com/servers/minecraft/game/lunarlabs/vote',          offset: 14 },
  { id: 'v4', name: 'MineRank',               host: 'minerank.com',              url: 'https://www.minerank.com/lunarlabs/vote#vote-now',                          offset: 21 },
  { id: 'v5', name: 'MC Best Servers',        host: 'minecraftbestservers.com',  url: 'https://minecraftbestservers.com/server-lunarlabs.6781/vote',                offset: 28 },
  { id: 'v6', name: 'MC Server List',         host: 'minecraft-server-list.com', url: 'https://minecraft-server-list.com/server/519138/vote/',                     offset: 35 },
];

const COOLDOWN_MS = 24 * 60 * 60 * 1000;

function getCookie(name) {
  const m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
  return m ? parseInt(decodeURIComponent(m[1]), 10) : null;
}

function setCookie(name, val) {
  const exp = new Date(Date.now() + 48 * 3600 * 1000).toUTCString();
  document.cookie = name + '=' + encodeURIComponent(val) + '; expires=' + exp + '; path=/; SameSite=Lax';
}

function pad(n) { return String(n).padStart(2, '0'); }

function remaining(site) {
  const t = getCookie(site.id);
  if (!t) return 0;
  const needed = COOLDOWN_MS + site.offset * 60 * 1000;
  return Math.max(0, needed - (Date.now() - t));
}

function isReady(site) { return remaining(site) === 0; }

function fmtRemaining(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return pad(h) + ':' + pad(m) + ':' + pad(s);
}

const ICON_EXTERNAL = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
const ICON_CHECK    = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`;

function buildItems() {
  const list = document.getElementById('voteList');
  list.innerHTML = '';
  SITES.forEach((s, i) => {
    const ready = isReady(s);
    const rem   = remaining(s);

    const item = document.createElement('div');
    item.className = 'vote-item';
    item.dataset.idx = i;
    item.innerHTML = `
      <div class="vote-left">
        <span class="vote-index">${i + 1}</span>
        <div class="vote-info">
          <div class="vote-name">${s.name}</div>
          <div class="vote-host">${s.host}</div>
        </div>
      </div>
      <div class="vote-right">
        <span class="countdown ${ready ? 'ready' : ''}">${ready ? 'Ready' : fmtRemaining(rem)}</span>
        <a href="${s.url}" target="_blank" rel="noopener noreferrer"
           class="vote-btn ${ready ? '' : 'voted'}"
           data-id="${s.id}">
          ${ready ? ICON_EXTERNAL + 'Vote' : ICON_CHECK + 'Voted'}
        </a>
      </div>
    `;

    const btn = item.querySelector('.vote-btn');
    if (ready) {
      btn.addEventListener('click', () => {
        setCookie(s.id, Date.now());
        setTimeout(tick, 200);
      });
    }

    list.appendChild(item);
  });
}

function tick() {
  const items = document.querySelectorAll('.vote-item');
  items.forEach((el, i) => {
    const s     = SITES[i];
    const ready = isReady(s);
    const rem   = remaining(s);
    const cd    = el.querySelector('.countdown');
    const btn   = el.querySelector('.vote-btn');

    if (ready) {
      cd.textContent = 'Ready';
      cd.className = 'countdown ready';
      if (btn.classList.contains('voted')) {
        btn.classList.remove('voted');
        btn.innerHTML = ICON_EXTERNAL + 'Vote';
        btn.addEventListener('click', () => {
          setCookie(s.id, Date.now());
          setTimeout(tick, 200);
        });
      }
    } else {
      cd.textContent = fmtRemaining(rem);
      cd.className = 'countdown';
    }
  });
}

buildItems();
setInterval(tick, 1000);
</script>
</body>
</html>
